  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--black:#0D0D0D;--forest:#0F4D2E;--green:#00E676;--off:#F7F6F3;--muted:rgba(247,246,243,0.48);--border:rgba(247,246,243,0.1);--green-dim:rgba(0,230,118,0.1);--green-border:rgba(0,230,118,0.22);}
    html,body{height:100%;}
    body{font-family:'Inter',sans-serif;background:var(--black);color:var(--off);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 20px;}
    .links-wrap{width:100%;max-width:420px;display:flex;flex-direction:column;align-items:center;}
    /* Logo */
    .links-logo{font-family:'Plus Jakarta Sans',sans-serif;font-weight:300;font-size:2rem;letter-spacing:0.04em;color:var(--off);margin-bottom:6px;}
    .links-logo span{color:var(--green);}
    .links-tagline{font-size:13px;color:var(--muted);margin-bottom:2.5rem;text-align:center;}
    /* Links */
    .link-item{width:100%;display:flex;align-items:center;gap:14px;padding:15px 20px;border:0.5px solid var(--border);border-radius:12px;text-decoration:none;color:var(--off);background:rgba(247,246,243,0.03);transition:all .2s;margin-bottom:10px;}
    .link-item:hover{background:var(--green-dim);border-color:var(--green-border);}
    .link-ico{width:36px;height:36px;border-radius:8px;background:rgba(247,246,243,0.06);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .link-ico svg{width:18px;height:18px;stroke:var(--muted);}
    .link-item:hover .link-ico svg{stroke:var(--green);}
    .link-text{font-size:14px;font-weight:500;}
    .link-sub{font-size:11px;color:var(--muted);margin-top:1px;}
    /* CTA destaque */
    .link-cta{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;padding:18px 20px;border-radius:12px;text-decoration:none;color:var(--black);background:var(--green);font-family:'Inter',sans-serif;font-size:15px;font-weight:500;margin-top:8px;transition:opacity .2s,transform .15s;-webkit-tap-highlight-color:transparent;}
    .link-cta:hover{opacity:.88;}.link-cta:active{transform:scale(0.97);}
    .link-cta svg{width:18px;height:18px;stroke:var(--black);fill:none;flex-shrink:0;}
    /* Rodapé */
    .links-footer{margin-top:2rem;font-size:11px;color:rgba(247,246,243,0.2);text-align:center;}
  </style>
